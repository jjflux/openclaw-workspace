<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EFFF00;stop-opacity:1" />
      <stop offset="25%" style="stop-color:#7ED321;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#50E3C2;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E5BFF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arrowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EFFF00;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7ED321;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#50E3C2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Target/Location pin base -->
  <path d="M100 25 C135 25, 165 55, 165 90 C165 125, 135 155, 100 155 C65 155, 35 125, 35 90 C35 55, 65 25, 100 25 Z" 
        fill="url(#mainGradient)" stroke="none"/>
  
  <!-- Bottom point of location pin -->
  <path d="M100 155 L85 170 L100 185 L115 170 Z" 
        fill="url(#mainGradient)" stroke="none"/>
  
  <!-- Target rings -->
  <circle cx="100" cy="90" r="45" fill="none" stroke="#000" stroke-width="6" opacity="0.8"/>
  <circle cx="100" cy="90" r="25" fill="none" stroke="#000" stroke-width="4" opacity="0.8"/>
  <circle cx="100" cy="90" r="10" fill="#000" opacity="0.8"/>
  
  <!-- Phone icon in center -->
  <path d="M92 80 C90 80, 88 82, 88 84 L88 86 C88 90, 90 92, 94 93 C96 94, 98 96, 100 98 C102 96, 104 94, 106 93 C110 92, 112 90, 112 86 L112 84 C112 82, 110 80, 108 80 L92 80 Z" 
        fill="white" stroke="none"/>
  
  <!-- Upward arrow -->
  <path d="M130 50 L145 35 L160 50 L152 58 L148 54 L140 62 L132 54 L128 58 Z" 
        fill="url(#arrowGradient)" stroke="none"/>
  
  <!-- Arrow shaft -->
  <rect x="142" y="54" width="6" height="25" fill="url(#arrowGradient)" rx="3"/>
</svg>