<?xml version="1.0" encoding="UTF-8"?>
<!--
Hero/Cover Banner — designed at 2560x1440 (YouTube channel art spec).
Center safe zone (TV-safe): 1235x338, centered. All critical content lives there.
Use cases:
  - YouTube channel banner (2560x1440)
  - Facebook cover (crop center 1640x624)
  - Site hero background (cover 1920x800-ish)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2560 1440" width="2560" height="1440" role="img" aria-label="LandMoreCalls — Stop Losing Jobs">
  <title>LandMoreCalls — Stop Losing Jobs. Start Landing More Calls.</title>
  <defs>
    <!-- Deep navy gradient base -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="55%" stop-color="#0B1220"/>
      <stop offset="100%" stop-color="#070B14"/>
    </linearGradient>

    <!-- Yellow gradient for accents -->
    <linearGradient id="y" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE047"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>

    <!-- Soft yellow glow -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.35"/>
      <stop offset="55%" stop-color="#F59E0B" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>

    <!-- Diagonal accent stripe pattern -->
    <pattern id="lines" x="0" y="0" width="42" height="42" patternUnits="userSpaceOnUse" patternTransform="rotate(-22)">
      <rect width="42" height="42" fill="transparent"/>
      <line x1="0" y1="0" x2="0" y2="42" stroke="#FACC15" stroke-width="1.2" opacity="0.06"/>
    </pattern>

    <!-- Grid for tech/precision feel -->
    <pattern id="grid" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#FACC15" stroke-width="0.6" opacity="0.05"/>
    </pattern>
  </defs>

  <!-- Background layers -->
  <rect width="2560" height="1440" fill="url(#bg)"/>
  <rect width="2560" height="1440" fill="url(#grid)"/>
  <rect width="2560" height="1440" fill="url(#lines)"/>

  <!-- Two big radial glows behind the focal area -->
  <ellipse cx="1280" cy="720" rx="900" ry="600" fill="url(#glow)"/>
  <ellipse cx="2050" cy="380" rx="500" ry="380" fill="url(#glow)" opacity="0.7"/>

  <!-- Decorative phone arc traces sweeping across (background atmosphere) -->
  <g fill="none" stroke="#FACC15" stroke-linecap="round" opacity="0.18">
    <path d="M 0 200 Q 600 60 1200 320 T 2560 480" stroke-width="3"/>
    <path d="M 0 380 Q 700 220 1400 480 T 2560 640" stroke-width="2" opacity="0.55"/>
    <path d="M 0 1080 Q 800 920 1500 1180 T 2560 1240" stroke-width="2.5" opacity="0.4"/>
  </g>

  <!-- Big floating dots (call landings) -->
  <g>
    <circle cx="380" cy="280" r="6" fill="#FACC15" opacity="0.5"/>
    <circle cx="2200" cy="1100" r="8" fill="#FACC15" opacity="0.4"/>
    <circle cx="2380" cy="240" r="5" fill="#FACC15" opacity="0.55"/>
    <circle cx="220" cy="1180" r="7" fill="#FACC15" opacity="0.35"/>
  </g>

  <!-- ============================ -->
  <!-- TV-SAFE ZONE: 1235x338 centered at (1280, 720). All critical content inside this. -->
  <!-- That means: x ∈ [662, 1898], y ∈ [551, 889] -->
  <!-- ============================ -->

  <!-- Logo mark in safe zone, left side -->
  <g transform="translate(700, 600) scale(1.1)">
    <rect x="0" y="0" width="180" height="180" rx="40" fill="url(#y)"/>
    <g fill="none" stroke="#0B1220" stroke-linecap="round" stroke-linejoin="round" stroke-width="12">
      <path d="M 25 49 Q 56 21 94 42 T 130 110"/>
      <path d="M 118 100 L 130 110 L 142 96"/>
    </g>
    <circle cx="130" cy="124" r="10" fill="#0B1220"/>
    <circle cx="130" cy="124" r="18" fill="none" stroke="#0B1220" stroke-width="4" opacity="0.6"/>
    <circle cx="130" cy="124" r="28" fill="none" stroke="#0B1220" stroke-width="2.2" opacity="0.3"/>
  </g>

  <!-- Wordmark + tagline (right of logo, inside safe zone) -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif">
    <!-- Eyebrow -->
    <text x="920" y="630" font-weight="800" font-size="34" fill="#FACC15" letter-spacing="6">BUILT FOR THE TRADES</text>

    <!-- Big wordmark -->
    <text x="920" y="745" font-weight="900" font-size="128" letter-spacing="-4" fill="#FFFFFF">Land<tspan fill="url(#y)">More</tspan>Calls</text>

    <!-- Headline tagline -->
    <text x="920" y="822" font-weight="700" font-size="42" fill="#E2E8F0" letter-spacing="-0.8">Stop losing jobs. Start landing more calls.</text>

    <!-- URL pill -->
    <g transform="translate(920, 855)">
      <rect x="0" y="0" width="320" height="48" rx="24" fill="#FACC15"/>
      <text x="160" y="33" text-anchor="middle" font-weight="900" font-size="22" fill="#0B1220" letter-spacing="2.5">LANDMORECALLS.COM</text>
    </g>
  </g>

</svg>
