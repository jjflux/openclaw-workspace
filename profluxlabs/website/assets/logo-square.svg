<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="LandMoreCalls">
  <title>LandMoreCalls</title>
  <defs>
    <linearGradient id="lmc-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE047"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>

  <!-- rounded square YELLOW background so it pops on any tab -->
  <rect x="0" y="0" width="256" height="256" rx="56" fill="url(#lmc-bg)"/>

  <!-- Arc arrow landing on dot -->
  <g fill="none" stroke="#0B1220" stroke-linecap="round" stroke-linejoin="round" stroke-width="16">
    <path d="M 36 70 Q 80 30 134 60 T 184 158"/>
    <path d="M 168 144 L 184 158 L 198 140"/>
  </g>

  <!-- Landing target rings -->
  <circle cx="184" cy="174" r="14" fill="#0B1220"/>
  <circle cx="184" cy="174" r="26" fill="none" stroke="#0B1220" stroke-width="6" opacity="0.6"/>
  <circle cx="184" cy="174" r="40" fill="none" stroke="#0B1220" stroke-width="3" opacity="0.3"/>
</svg>
