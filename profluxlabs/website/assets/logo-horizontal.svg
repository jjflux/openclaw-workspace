<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 120" width="540" height="120" role="img" aria-label="LandMoreCalls">
  <title>LandMoreCalls</title>
  <defs>
    <linearGradient id="lmc-yellow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE047"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>

  <!-- Mark: rounded square with a clean arc curving down into a target dot -->
  <g transform="translate(8,18)">
    <rect x="0" y="0" width="84" height="84" rx="20" fill="#0B1220"/>

    <!-- Single smooth arc: starts top-left, curves down and right, ends at arrowhead -->
    <path d="M 16 24 Q 50 8 64 56"
          fill="none"
          stroke="url(#lmc-yellow)"
          stroke-linecap="round"
          stroke-width="6"/>

    <!-- Arrowhead pointing down at end of arc, into the target -->
    <path d="M 56 50 L 64 60 L 72 50"
          fill="none"
          stroke="url(#lmc-yellow)"
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="6"/>

    <!-- Landing target -->
    <circle cx="64" cy="68" r="5.5" fill="url(#lmc-yellow)"/>
    <circle cx="64" cy="68" r="11" fill="none" stroke="url(#lmc-yellow)" stroke-width="2.2" opacity="0.45"/>
  </g>

  <!-- Wordmark -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="48" letter-spacing="-1.6">
    <text x="106" y="74" fill="#0B1220">Land<tspan fill="url(#lmc-yellow)">More</tspan>Calls</text>
  </g>
</svg>
