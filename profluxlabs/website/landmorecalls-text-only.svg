<svg viewBox="0 0 400 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EFFF00"/>
      <stop offset="33%" style="stop-color:#7ED321"/>
      <stop offset="66%" style="stop-color:#50E3C2"/>
      <stop offset="100%" style="stop-color:#4A90E2"/>
    </linearGradient>
  </defs>
  
  <!-- Company Name -->
  <text x="0" y="40" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="800" fill="#0f172a" letter-spacing="-0.01em">
    Land 
    <tspan fill="url(#textGradient)">More</tspan>
    <tspan fill="#0f172a"> Calls</tspan>
  </text>
  
  <!-- Tagline -->
  <text x="0" y="65" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="500" fill="#64748b" letter-spacing="0.08em">
    NEVER MISS ANOTHER CUSTOMER CALL
