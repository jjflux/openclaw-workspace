<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMS Sign-Up | LandMoreCalls</title>
<meta name="description" content="Sign up to receive SMS notifications from LandMoreCalls including new lead alerts, appointment confirmations, and account updates.">
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    max-width: 600px;
    margin: 0 auto;
    padding: 40px 20px;
    color: #1a1a1a;
    line-height: 1.5;
    background: #ffffff;
  }
  header { margin-bottom: 32px; }
  h1 { font-size: 28px; margin: 0 0 8px 0; font-weight: 700; }
  .subtitle { color: #555; margin: 0; font-size: 16px; }
  form { display: flex; flex-direction: column; }
  label.field-label {
    display: block;
    font-weight: 600;
    margin-top: 18px;
    margin-bottom: 6px;
    font-size: 14px;
  }
  input[type="text"],
  input[type="tel"],
  input[type="email"] {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-family: inherit;
  }
  input:focus {
    outline: none;
    border-color: #0066ff;
    box-shadow: 0 0 0 3px rgba(0,102,255,0.15);
  }
  .consent-box {
    background: #f7f7f8;
    padding: 16px;
    border-radius: 6px;
    margin-top: 28px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
    border: 1px solid #e5e5e7;
  }
  .consent-box input[type="checkbox"] {
    margin-top: 4px;
    flex-shrink: 0;
    width: 18px;
    height: 18px;
    cursor: pointer;
  }
  .consent-box label {
    margin: 0;
    font-weight: 400;
    font-size: 14px;
    line-height: 1.55;
    cursor: pointer;
  }
  button[type="submit"] {
    background: #0066ff;
    color: white;
    border: none;
    padding: 14px 24px;
    font-size: 16px;
    font-weight: 600;
    border-radius: 6px;
    margin-top: 24px;
    cursor: pointer;
    width: 100%;
    transition: background 0.15s ease;
  }
  button[type="submit"]:hover { background: #0052cc; }
  .footer-note {
    font-size: 12px;
    color: #888;
    margin-top: 32px;
    text-align: center;
    line-height: 1.6;
  }
  a { color: #0066ff; text-decoration: underline; }
  a:hover { text-decoration: none; }
</style>
</head>
<body>

<header>
  <h1>Sign Up for SMS Updates</h1>
  <p class="subtitle">Get new lead alerts, appointment confirmations, and account updates from LandMoreCalls delivered straight to your phone.</p>
</header>

<form name="sms-signup" method="POST" data-netlify="true" netlify-honeypot="bot-field">

  <input type="hidden" name="form-name" value="sms-signup">
  <p style="display:none;"><label>Don't fill this out: <input name="bot-field"></label></p>

  <label class="field-label" for="name">Full Name</label>
  <input type="text" id="name" name="name" required>

  <label class="field-label" for="business">Business Name</label>
  <input type="text" id="business" name="business" required>

  <label class="field-label" for="phone">Mobile Phone Number</label>
  <input type="tel" id="phone" name="phone" required placeholder="(555) 555-5555">

  <label class="field-label" for="email">Email Address</label>
  <input type="email" id="email" name="email" required>

  <div class="consent-box">
    <input type="checkbox" id="sms_consent" name="sms_consent" required>
    <label for="sms_consent">
      I agree to receive SMS text messages from LandMoreCalls at the mobile number provided, including new lead alerts when my AI receptionist captures inbound calls, appointment confirmations, and account/service updates. Message frequency varies based on call volume. Message and data rates may apply. Reply STOP to unsubscribe or HELP for help. Consent is not a condition of purchase. View our <a href="/sms-terms.html">SMS Terms</a> and <a href="/privacy.html">Privacy Policy</a>.
    </label>
  </div>

  <button type="submit">Sign Up for SMS Updates</button>

</form>

<p class="footer-note">
  LandMoreCalls &middot; A ProFlux Labs LLC Company<br>
  (925) 999-0285 &middot; jason@landmorecalls.com
</p>

</body>
</html>
